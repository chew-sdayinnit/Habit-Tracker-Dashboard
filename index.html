══════════════════════════════════════════════════════════ */
function Todos({data,save}){
  const [txt,setTxt]=useState(''),[pri,setPri]=useState('medium'),[fil,setFil]=useState('active');
  const add=()=>{if(!txt.trim())return;save({...data,todos:{list:[...data.todos.list,{id:Date.now(),text:txt.trim(),priority:pri,done:false}]}});setTxt('');};
  const tog=(id)=>save({...data,todos:{list:data.todos.list.map(td=>td.id===id?{...td,done:!td.done,completedAt:!td.done?today():null}:td)}});
  const rem=(id)=>save({...data,todos:{list:data.todos.list.filter(td=>td.id!==id)}});
  const fl=fil==='all'?data.todos.list:fil==='active'?data.todos.list.filter(td=>!td.done):data.todos.list.filter(td=>td.done);
  const sorted=[...fl].sort((a,b)=>({high:0,medium:1,low:2}[a.priority]-{high:0,medium:1,low:2}[b.priority]));
  const active=data.todos.list.filter(td=>!td.done).length;
  const done=data.todos.list.filter(td=>td.done).length;
  const total=data.todos.list.length;
  const pct=total?Math.round(done/total*100):0;
  const taskPctTrend=last(7).map(d=>{const tot=data.todos.list.filter(td=>!td.createdAt||td.createdAt<=d).length;const comp=data.todos.list.filter(td=>td.completedAt===d).length;return tot>0?Math.round(comp/tot*100):0;});
  return(<div className="section-enter">
    <div className="card" style={{background:'linear-gradient(135deg,var(--s2),#110e20)',borderColor:VI+'33'}}>
      <div style={{display:'flex',gap:20,alignItems:'center',flexWrap:'wrap'}}>
        <Ring pct={pct} sz={120} sw={10} color={VI} val={`${pct}%`} label="complete" sub={`${done}/${total}`} glow/>
        <div style={{flex:1,minWidth:160}}>
          <div className="g2" style={{gap:8,marginBottom:12}}>
            <Stat label="Remaining" val={active} color={RO} accent={RO}/>
            <Stat label="Completed" val={done} color={EM} accent={EM}/>
          </div>
          <Prog pct={pct} color={VI}/>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
            <span style={{fontSize:11,color:'var(--t3)'}}>Progress</span>
            <span style={{fontFamily:'var(--mono)',fontSize:11,color:VI,fontWeight:700}}>{pct}%</span>
          </div>
        </div>
      </div>
    </div>
    {/* Trend line */}
    <div className="card">
      <div className="sh">Completion trend — 7 days</div>
      <Spark vals={taskPctTrend} color={VI} h={90} labels={last(7).map(dn)}/>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:10,paddingTop:8,borderTop:'1px solid var(--b0)'}}>
        <span style={{fontSize:11,color:'var(--t3)'}}>Tasks completed each day</span>
        <span style={{fontFamily:'var(--mono)',fontSize:11,color:VI,fontWeight:700}}>{taskPctTrend[taskPctTrend.length-1]}% today</span>
      </div>
    </div>
    {total>0&&<div className="card">
      <div className="sh">Priority breakdown</div>
      <div className="g3">
        {[{l:'High',c:RO,v:data.todos.list.filter(td=>td.priority==='high').length},{l:'Medium',c:AM,v:data.todos.list.filter(td=>td.priority==='medium').length},{l:'Low',c:'var(--t3)',v:data.todos.list.filter(td=>td.priority==='low').length}].map(x=>(
          <div key={x.l} className="inner" style={{textAlign:'center',borderTop:`2px solid ${x.c}`}}>
            <div style={{fontFamily:'var(--mono)',fontSize:28,fontWeight:800,color:x.c,marginBottom:4}}>{x.v}</div>
            <div className="label-sm">{x.l}</div>
          </div>
        ))}
      </div>
    </div>}
    <div className="card">
      <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
        <input value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Add a task..." style={{flex:1,minWidth:150}}/>
        <select value={pri} onChange={e=>setPri(e.target.value)} style={{width:'auto',color:PRI[pri]}}>
          <option value="high">🔴 High</option><option value="medium">🟡 Medium</option><option value="low">⚪ Low</option>
        </select>
        <button onClick={add} className="btn">Add</button>
      </div>
      <div style={{display:'flex',gap:6}}>
        {[['active',`Active (${active})`],['done',`Done (${done})`],['all','All']].map(([f,l])=>(
          <button key={f} onClick={()=>setFil(f)} className={`btn-g${fil===f?' on':''}`}>{l}</button>
        ))}
      </div>
    </div>
    <div className="card">
      {sorted.length===0&&<div style={{color:'var(--t4)',fontSize:13,textAlign:'center',padding:'16px 0'}}>Nothing here.</div>}
      {sorted.map(td=>(
        <div key={td.id} className="row">
          <button className={`cbx2${td.done?' on':''}`} style={{borderColor:td.done?EM:PRI[td.priority]}} onClick={()=>tog(td.id)}>{td.done&&'✓'}</button>
          <div style={{flex:1,fontSize:13,color:td.done?'var(--t3)':'var(--t1)',textDecoration:td.done?'line-through':'none',fontWeight:td.priority==='high'&&!td.done?500:400}}>{td.text}</div>
          <div style={{width:7,height:7,borderRadius:'50%',background:PRI[td.priority],flexShrink:0,boxShadow:`0 0 6px ${PRI[td.priority]}`}}/>
          <button className="btni" onClick={()=>rem(td.id)}>✕</button>
        </div>
      ))}
    </div>
  </div>);
}

/* ══════════════════════════════════════════════════════════
   BUSINESS
══════════════════════════════════════════════════════════ */
function Business({data,save}){
  const [cf,setCf]=useState({name:'',amount:'',startDate:today(),notes:''});
  const [kf,setKf]=useState({name:'',target:'',current:'',unit:''});
  const clients=data.business.clients||[];
  const retainers=data.business.retainers||[];
  const kpis=data.business.kpis||[];
  const mrr=retainers.reduce((s,r)=>s+Number(r.amount||0),0);
  const arr=mrr*12;
  const revTrend=last(7).map((_,i)=>i===6?mrr:mrr*(0.7+i*0.05));
  const addClient=()=>{
    if(!cf.name)return;
    const id=Date.now();
    save({...data,business:{...data.business,clients:[...clients,{id,name:cf.name,startDate:cf.startDate,notes:cf.notes}],retainers:[...retainers,{id,clientId:id,amount:cf.amount,name:cf.name}]}});
    setCf({name:'',amount:'',startDate:today(),notes:''});
  };
  const remClient=(id)=>save({...data,business:{...data.business,clients:clients.filter(c=>c.id!==id),retainers:retainers.filter(r=>r.clientId!==id)}});
  const addKpi=()=>{if(!kf.name)return;save({...data,business:{...data.business,kpis:[...kpis,{...kf,id:Date.now()}]}});setKf({name:'',target:'',current:'',unit:''});};
  return(<div className="section-enter">
    <div className="card glow-em" style={{background:'linear-gradient(135deg,var(--s2),#0c1a0e)'}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
        <Ring pct={Math.min(100,clients.length*10)} sz={140} sw={11} color={EM} val={String(clients.length)} label="clients" sub="signed" glow/>
        <div className="g2" style={{width:'100%',gap:10}}>
          <Stat label="MRR" val={`$${mrr.toLocaleString()}`} color={EM} accent={EM} sub="per month"/>
          <Stat label="ARR" val={`$${arr.toLocaleString()}`} color={EM} accent={TE} sub="annualized"/>
        </div>
      </div>
    </div>
    <div className="card">
      <div className="sh">MRR trend</div>
      <Spark vals={revTrend} color={EM} h={90} labels={last(7).map(dn)}/>
    </div>
    <div className="card">
      <div className="sh">Clients ({clients.length})</div>
      {clients.length===0&&<div style={{color:'var(--t4)',fontSize:13,textAlign:'center',padding:'16px 0'}}>No clients yet — add your first below.</div>}
      {clients.map(c=>{const ret=retainers.find(r=>r.clientId===c.id);return(
        <div key={c.id} className="row">
          <div style={{width:40,height:40,borderRadius:11,background:EM+'18',border:`1px solid ${EM}30`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:800,color:EM,flexShrink:0}}>{c.name.charAt(0).toUpperCase()}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:600}}>{c.name}</div>
            <div style={{fontSize:11,color:'var(--t3)',marginTop:1}}>Since {fmt(c.startDate)}{c.notes?` · ${c.notes}`:''}</div>
          </div>
          <div style={{fontFamily:'var(--mono)',fontSize:15,fontWeight:700,color:EM}}>${Number(ret?ret.amount:0).toLocaleString()}<span style={{fontSize:10,color:'var(--t3)',fontWeight:400}}>/mo</span></div>
          <button className="btni" onClick={()=>remClient(c.id)}>✕</button>
        </div>
      );})}
      <div className="sh" style={{marginTop:18}}>Add client</div>
      <div className="g2" style={{gap:10,marginBottom:10}}>
        <div><div className="label" style={{marginBottom:5}}>Client name</div><input value={cf.name} onChange={e=>setCf(p=>({...p,name:e.target.value}))} placeholder="Client Co."/></div>
        <div><div className="label" style={{marginBottom:5}}>Retainer ($/mo)</div><input value={cf.amount} onChange={e=>setCf(p=>({...p,amount:e.target.value}))} type="number" placeholder="0"/></div>
        <div><div className="label" style={{marginBottom:5}}>Start date</div><input value={cf.startDate} onChange={e=>setCf(p=>({...p,startDate:e.target.value}))} type="date"/></div>
        <div><div className="label" style={{marginBottom:5}}>Notes</div><input value={cf.notes} onChange={e=>setCf(p=>({...p,notes:e.target.value}))} placeholder="Service type..."/></div>
      </div>
      <button onClick={addClient} className="btn">Add client</button>
    </div>
    <div className="card">
      <div className="sh">KPI tracker</div>
      {kpis.map(k=>{const pct=k.target?Math.min(100,Number(k.current)/Number(k.target)*100):0;const c=pct>=80?EM:pct>=50?VI:AM;return(
        <div key={k.id} style={{padding:'12px 0',borderBottom:'1px solid var(--b0)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:600}}>{k.name} <span style={{color:'var(--t3)',fontWeight:400,fontSize:12}}>{k.unit}</span></div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <input value={k.current} onChange={e=>save({...data,business:{...data.business,kpis:kpis.map(x=>x.id===k.id?{...x,current:e.target.value}:x)}})} type="number" style={{width:80,textAlign:'right'}}/>
              <span style={{color:'var(--t3)',fontSize:12}}>/ {k.target}</span>
              <button className="btni" onClick={()=>save({...data,business:{...data.business,kpis:kpis.filter(x=>x.id!==k.id)}})}>✕</button>
            </div>
          </div>
          <Prog pct={pct} color={c}/>
          <div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:11,color:c,marginTop:4,fontWeight:700}}>{pct.toFixed(0)}%</div>
        </div>
      );})}
      <div style={{marginTop:16}}>
        <div className="fg4" style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:8,marginBottom:10}}>
          <input value={kf.name} onChange={e=>setKf(p=>({...p,name:e.target.value}))} placeholder="KPI name"/>
          <input value={kf.current} onChange={e=>setKf(p=>({...p,current:e.target.value}))} placeholder="Now" type="number"/>
          <input value={kf.target} onChange={e=>setKf(p=>({...p,target:e.target.value}))} placeholder="Target" type="number"/>
          <input value={kf.unit} onChange={e=>setKf(p=>({...p,unit:e.target.value}))} placeholder="Unit"/>
        </div>
        <button onClick={addKpi} className="btn">Add KPI</button>
      </div>
    </div>
  </div>);
}

/* ══════════════════════════════════════════════════════════
   FINANCE
══════════════════════════════════════════════════════════ */
function Finance({data,save}){
  const t=today(),m=month();
  const [form,setForm]=useState({type:'expense',category:'',amount:'',note:'',date:t});
  const add=()=>{if(!form.amount||!form.category)return;save({...data,finance:{transactions:[...data.finance.transactions,{...form,id:Date.now()}]}});setForm({type:'expense',category:'',amount:'',note:'',date:t});};
  const rem=(id)=>save({...data,finance:{transactions:data.finance.transactions.filter(tx=>tx.id!==id)}});
  const mtx=data.finance.transactions.filter(tx=>tx.date&&tx.date.startsWith(m));
  const inc=mtx.filter(tx=>tx.type==='income').reduce((s,tx)=>s+Number(tx.amount),0);
  const exp=mtx.filter(tx=>tx.type==='expense').reduce((s,tx)=>s+Number(tx.amount),0);
  const net=inc-exp,sr=inc>0?Math.max(0,Math.round(net/inc*100)):0;
  const catT={};mtx.filter(tx=>tx.type==='expense').forEach(tx=>{catT[tx.category]=(catT[tx.category]||0)+Number(tx.amount);});
  const mxC=Math.max(...Object.values(catT),1);
  const dailySpend=last(7).map(d=>data.finance.transactions.filter(tx=>tx.date===d&&tx.type==='expense').reduce((s,tx)=>s+Number(tx.amount),0));
  const CAT_COLORS=[RO,AM,VI,BL,PK,EM,TE];
  return(<div className="section-enter">
    <div className="card" style={{background:`linear-gradient(135deg,var(--s2),${net>=0?'#0c1a0e':'#1a0c0e'})`,borderColor:(net>=0?TE:RO)+'33'}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
        <Ring pct={sr} sz={150} sw={12} color={net>=0?TE:RO} val={`${sr}%`} label="saved" sub={net>=0?'on track':'overspent'} glow/>
        <div className="g2" style={{width:'100%',gap:10}}>
          <Stat label="Income" val={`$${inc.toLocaleString()}`} color={EM} accent={EM}/>
          <Stat label="Expenses" val={`$${exp.toLocaleString()}`} color={RO} accent={RO}/>
          <Stat label="Net" val={`$${net.toLocaleString()}`} color={net>=0?TE:RO} accent={net>=0?TE:RO}/>
          <Stat label="Savings rate" val={`${sr}%`} color={net>=0?TE:RO} accent={net>=0?TE:RO}/>
        </div>
      </div>
    </div>
    <div className="card">
      <div className="sh">Daily spending — 7 days</div>
      <Bars vals={dailySpend} labels={last(7).map(dn)} color={RO} h={120}/>
    </div>
    {Object.keys(catT).length>0&&<div className="card">
      <div className="sh">Spending by category</div>
      {Object.entries(catT).sort((a,b)=>b[1]-a[1]).map(([cat,amt],i)=>(
        <div key={cat} style={{marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,alignItems:'center'}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:CAT_COLORS[i%CAT_COLORS.length],boxShadow:`0 0 6px ${CAT_COLORS[i%CAT_COLORS.length]}`}}/>
              <span style={{fontSize:13,fontWeight:500}}>{cat}</span>
            </div>
            <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:RO}}>${amt.toLocaleString()}</span>
          </div>
          <div style={{background:'var(--s3)',borderRadius:6,height:5,overflow:'hidden'}}>
            <div style={{width:`${(amt/mxC)*100}%`,height:'100%',background:CAT_COLORS[i%CAT_COLORS.length],borderRadius:6,opacity:.7}}/>
          </div>
        </div>
      ))}
    </div>}
    <div className="card">
      <div className="sh">Add transaction</div>
      <div className="g2" style={{gap:10,marginBottom:14}}>
        <div><div className="label" style={{marginBottom:5}}>Type</div><select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))} style={{color:form.type==='income'?EM:RO}}><option value="income">Income</option><option value="expense">Expense</option></select></div>
        <div><div className="label" style={{marginBottom:5}}>Category</div><input value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))} placeholder="e.g. Rent"/></div>
        <div><div className="label" style={{marginBottom:5}}>Amount ($)</div><input value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} type="number" placeholder="0.00"/></div>
        <div><div className="label" style={{marginBottom:5}}>Date</div><input value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} type="date"/></div>
        <div style={{gridColumn:'1/-1'}}><div className="label" style={{marginBottom:5}}>Note</div><input value={form.note} onChange={e=>setForm(p=>({...p,note:e.target.value}))} placeholder="Description"/></div>
      </div>
      <button onClick={add} className="btn">Add transaction</button>
    </div>
    <div className="card">
      <div className="sh">Recent transactions</div>
      {mtx.length===0&&<div style={{color:'var(--t4)',fontSize:13,textAlign:'center',padding:'14px 0'}}>No transactions this month.</div>}
      {[...mtx].reverse().slice(0,14).map(tx=>(
        <div key={tx.id} className="row">
          <div style={{width:36,height:36,borderRadius:10,background:tx.type==='income'?EM+'18':RO+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0,border:`1px solid ${tx.type==='income'?EM:RO}30`}}>{tx.type==='income'?'↑':'↓'}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600}}>{tx.category}{tx.note?<span style={{color:'var(--t3)',fontWeight:400}}> — {tx.note}</span>:''}</div>
            <div className="label-sm" style={{marginTop:2}}>{fmt(tx.date)}</div>
          </div>
          <div style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color:tx.type==='income'?EM:RO}}>{tx.type==='income'?'+':'-'}${Number(tx.amount).toLocaleString()}</div>
          <button className="btni" onClick={()=>rem(tx.id)}>✕</button>
        </div>
      ))}
    </div>
  </div>);
}

/* ══════════════════════════════════════════════════════════
   HISTORY
══════════════════════════════════════════════════════════ */
function History({data}){
  const [sel,setSel]=useState(today());
  const days30=last(30);
  const d=sel;
  const sl=data.sleep.logs.find(l=>l.date===d)||null;
  const fw=data.fitness.workouts.find(w=>w.date===d)||null;
  const habits=data.goals.habits;
  const habDone=habits.filter(h=>h.completedDates&&h.completedDates.includes(d));
  const habMissed=habits.filter(h=>!(h.completedDates&&h.completedDates.includes(d)));
  const todosDone=data.todos.list.filter(td=>td.completedAt===d);
  const txns=data.finance.transactions.filter(tx=>tx.date===d);
  const inc=txns.filter(tx=>tx.type==='income').reduce((s,tx)=>s+Number(tx.amount),0);
  const exp=txns.filter(tx=>tx.type==='expense').reduce((s,tx)=>s+Number(tx.amount),0);
  const hasAny=sl||fw||habDone.length>0||todosDone.length>0||txns.length>0;
  const prev=()=>{const idx=days30.indexOf(sel);if(idx>0)setSel(days30[idx-1]);};
  const next=()=>{const idx=days30.indexOf(sel);if(idx<days30.length-1)setSel(days30[idx+1]);};
  return(<div className="section-enter">
    <div className="card glow-vi" style={{background:'linear-gradient(135deg,var(--s2),#110e20)'}}>
      <div className="sh">Browse history</div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18}}>
        <button onClick={prev} className="btn-g" style={{padding:'9px 15px',fontSize:17}}>←</button>
        <div style={{flex:1,textAlign:'center'}}>
          <div style={{fontSize:18,fontWeight:800,color:'var(--t1)',letterSpacing:'-.01em'}}>{new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
          {d===today()&&<div style={{fontSize:11,color:VI,fontWeight:600,marginTop:3}}>Today</div>}
        </div>
        <button onClick={next} disabled={d===today()} className="btn-g" style={{padding:'9px 15px',fontSize:17,opacity:d===today()?.3:1}}>→</button>
      </div>
      <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
        {days30.map(day=>{
          const hasSl=data.sleep.logs.some(l=>l.date===day);
          const hasW=data.fitness.workouts.some(w=>w.date===day);
          const hasH=data.goals.habits.some(h=>h.completedDates&&h.completedDates.includes(day));
          const hasData=hasSl||hasW||hasH;
          const isSel=day===sel;
          return(
            <button key={day} onClick={()=>setSel(day)} title={fmt(day)} style={{width:30,height:30,borderRadius:9,border:`1.5px solid ${isSel?VI:hasData?'var(--b1)':'transparent'}`,background:isSel?VI:hasData?'var(--s3)':'transparent',color:isSel?'#07080f':hasData?'var(--t2)':'var(--t4)',cursor:'pointer',fontSize:10,fontWeight:isSel?700:400,transition:'all .18s',fontFamily:'var(--mono)'}}>
              {new Date(day+'T12:00').getDate()}
            </button>
          );
        })}
      </div>
    </div>
    {!hasAny&&<div className="card" style={{textAlign:'center',padding:'36px 0'}}>
      <div style={{fontSize:36,marginBottom:10}}>📭</div>
      <div style={{fontSize:15,fontWeight:700,color:'var(--t2)'}}>No data for this day</div>
      <div style={{fontSize:12,color:'var(--t3)',marginTop:5}}>Keep logging to build your history</div>
    </div>}
    {sl&&<div className="card">
      <div className="sh">Sleep & Health</div>
      <div className="g2" style={{gap:10}}>
        {[{l:'Hours slept',v:sl.hours?`${sl.hours}h`:'—',c:BL},{l:'Quality',v:sl.quality?`${sl.quality}/5`:'—',c:sl.quality>=4?EM:sl.quality>=3?AM:RO},{l:'Water',v:sl.water?`${sl.water}L`:'—',c:TE},{l:'Steps',v:sl.steps||'—',c:'var(--t1)'},{l:'Weight',v:sl.bodyWeight?`${sl.bodyWeight}lbs`:'—',c:'var(--t1)'}].map(x=><Stat key={x.l} label={x.l} val={x.v} color={x.c} accent={x.c}/>)}
      </div>
    </div>}
    {fw&&fw.exercises&&fw.exercises.length>0&&<div className="card">
      <div className="sh">Workout</div>
      <div style={{marginBottom:14}}><Stat label="Total sets" val={fw.exercises.reduce((s,e)=>s+Number(e.sets||0),0)} color={VI} accent={VI}/></div>
      {fw.exercises.map((e,i)=>(
        <div key={i} className="row">
          <span style={{flex:1,fontSize:13,fontWeight:600}}>{e.name}</span>
          <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--t2)'}}>{e.sets}×{e.reps}{e.weight?` @ ${e.weight}lbs`:''}</span>
        </div>
      ))}
    </div>}
    {habits.length>0&&<div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div className="sh" style={{margin:0}}>Habits</div>
        <div style={{fontFamily:'var(--mono)',fontSize:12,color:habDone.length===habits.length?EM:AM,fontWeight:700}}>{habDone.length}/{habits.length} completed</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {habits.map((h,hi)=>{
          const COLS=[AM,VI,TE,BL,PK,EM,RO];
          const col=COLS[hi%COLS.length];
          const wasDone=habDone.find(x=>x.id===h.id);
          return(
            <div key={h.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:wasDone?col+'10':'var(--s1)',borderRadius:12,border:`1px solid ${wasDone?col+'40':'var(--b0)'}`}}>
              <div style={{width:22,height:22,borderRadius:'50%',background:wasDone?col:'var(--s3)',border:`1.5px solid ${wasDone?col:'var(--b2)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:wasDone?'#07080f':'var(--t4)',flexShrink:0,fontWeight:700}}>{wasDone&&'✓'}</div>
              <div style={{flex:1,fontSize:13,fontWeight:wasDone?600:400,color:wasDone?col:'var(--t3)'}}>{h.name}</div>
              <div style={{fontSize:10,fontWeight:700,color:wasDone?col:'var(--t4)'}}>{wasDone?'Done':'Missed'}</div>
            </div>
          );
        })}
      </div>
    </div>}
    {todosDone.length>0&&<div className="card">
      <div className="sh">Tasks completed</div>
      {todosDone.map(td=>(
        <div key={td.id} className="row">
          <div style={{width:6,height:6,borderRadius:'50%',background:PRI[td.priority],flexShrink:0}}/>
          <span style={{fontSize:13,color:'var(--t2)',textDecoration:'line-through'}}>{td.text}</span>
        </div>
      ))}
    </div>}
    {txns.length>0&&<div className="card">
      <div className="sh">Transactions</div>
      <div className="g2" style={{gap:10,marginBottom:14}}>
        <Stat label="Income" val={`$${inc.toLocaleString()}`} color={EM} accent={EM}/>
        <Stat label="Expenses" val={`$${exp.toLocaleString()}`} color={RO} accent={RO}/>
      </div>
      {txns.map(tx=>(
        <div key={tx.id} className="row">
          <div style={{width:32,height:32,borderRadius:9,background:tx.type==='income'?EM+'18':RO+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0}}>{tx.type==='income'?'↑':'↓'}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600}}>{tx.category}{tx.note?<span style={{color:'var(--t3)',fontWeight:400}}> — {tx.note}</span>:''}</div>
          </div>
          <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:tx.type==='income'?EM:RO}}>{tx.type==='income'?'+':'-'}${Number(tx.amount).toLocaleString()}</div>
        </div>
      ))}
    </div>}
  </div>);
}

/* ══════════════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════════════ */
const ICONS={
  overview:(col)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
  fitness:(col)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 4v16M18 4v16M3 9h3M18 9h3M3 15h3M18 15h3M6 12h12"/></svg>,
  sleep:(col)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>,
  goals:(col)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1" fill={col}/></svg>,
  todos:(col)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>,
  business:(col)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>,
  finance:(col)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/></svg>,
  history:(col)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>,
};
const NAV=[
  {id:'overview',l:'Main',c:VI},
  {id:'fitness',l:'Gym',c:VI},
  {id:'sleep',l:'Health',c:BL},
  {id:'goals',l:'Goals',c:AM},
  {id:'todos',l:'Tasks',c:VI},
  {id:'business',l:'Brand',c:EM},
  {id:'finance',l:'Finance',c:TE},
  {id:'history',l:'History',c:PK},
];
const TITLES={overview:'Overview',fitness:'Gym',sleep:'Health',goals:'Goals & Habits',todos:'Tasks',business:'Brand',finance:'Finances',history:'History'};

function App(){
  const [sec,setSec]=useState('overview');
  const [data,setData]=useState(DEF);
  const [aiOpen,setAiOpen]=useState(false);
  const [session,setSession]=useState(null);
  const [appLoading,setAppLoading]=useState(true);
  const [hasRow,setHasRow]=useState(false);
  const saveTimer=useRef(null);
  useEffect(()=>{
    const token=localStorage.getItem('sb-token');
    const uid=localStorage.getItem('sb-uid');
    if(token&&uid){handleLogin(token,uid);}else{setAppLoading(false);}
  },[]);
  const handleLogin=async(token,uid)=>{
    setAppLoading(true);
    const remote=await sbLoad(uid,token);
    if(remote){setData(remote);setHasRow(true);}
    else{setData(ls('dashboard-v3',DEF));setHasRow(false);}
    setSession({token,uid});
    setAppLoading(false);
  };
  const handleSignOut=async()=>{
    if(session)await sbSignOut(session.token);
    localStorage.removeItem('sb-token');localStorage.removeItem('sb-uid');
    setSession(null);setData(DEF);setHasRow(false);
  };
  const save=(nd)=>{
    setData(nd);ss('dashboard-v3',nd);
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      if(session){await sbSave(session.uid,session.token,nd,hasRow);if(!hasRow)setHasRow(true);}
    },1500);
  };
  const h=new Date().getHours();
  const period=h<12?'Morning':h<17?'Afternoon':'Evening';
  const dateStr=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
  if(appLoading)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)',flexDirection:'column',gap:16}}>
      <div style={{width:44,height:44,borderRadius:'50%',border:'3px solid var(--s4)',borderTopColor:VI,animation:'spin .8s linear infinite'}}/>
      <div style={{fontSize:13,color:'var(--t3)'}}>Loading your dashboard...</div>
    </div>
  );
  if(!session)return <LoginScreen onLogin={handleLogin}/>;
  const navColor=NAV.find(n=>n.id===sec);
  return(<div id="root">
    <div className="topbar">
      <div>
        <div className="tb-title">My Dashboard</div>
        <div className="tb-sub">{TITLES[sec]} · {dateStr}</div>
      </div>
      <div className="tb-right">
        <span className="chip">{dateStr}</span>
        <span className="chip live"><span className="chip-dot"/>  {period}</span>
        <button onClick={handleSignOut} style={{background:'transparent',border:'1px solid var(--b1)',borderRadius:8,color:'var(--t3)',padding:'5px 11px',fontSize:11,cursor:'pointer',fontFamily:'Inter,sans-serif',transition:'all .18s'}}
          onMouseOver={e=>e.currentTarget.style.color=RO} onMouseOut={e=>e.currentTarget.style.color='var(--t3)'}>Sign out</button>
      </div>
    </div>
    <div className="shell">
      <nav className="sidebar">
        {NAV.map(({id,l,c:nc})=>(
          <button key={id} className={`nb${sec===id?' on':''}`} onClick={()=>setSec(id)} title={l}>
            {ICONS[id]&&ICONS[id](sec===id?nc:'var(--t4)')}
            <span className="nl" style={{color:sec===id?nc:'var(--t4)'}}>{l}</span>
          </button>
        ))}
        <div className="ns"/>
        <button className={`aib${aiOpen?' on':''}`} onClick={()=>setAiOpen(p=>!p)} title="Overseer">✦</button>
      </nav>
      <div className="main">
        <div className="scroll" key={sec}>
          {sec==='overview'&&<Overview data={data}/>}
          {sec==='fitness'&&<Fitness data={data} save={save}/>}
          {sec==='sleep'&&<SleepHealth data={data} save={save}/>}
          {sec==='goals'&&<GoalsHabits data={data} save={save}/>}
          {sec==='todos'&&<Todos data={data} save={save}/>}
          {sec==='business'&&<Business data={data} save={save}/>}
          {sec==='finance'&&<Finance data={data} save={save}/>}
          {sec==='history'&&<History data={data}/>}
        </div>
      </div>
      <AIPanel data={data} open={aiOpen} onClose={()=>setAiOpen(false)}/>
    </div>
    <div className="mobnav">
      <div className="mobin">
        {NAV.map(({id,l,c:nc})=>(
          <button key={id} className={`mbb${sec===id?' on':''}`} onClick={()=>setSec(id)} style={sec===id?{color:nc}:{}}>
            {ICONS[id]&&ICONS[id](sec===id?nc:'var(--t3)')}
            <span className="nl">{l}</span>
          </button>
        ))}
{/* AI removed from mobile nav - access via sidebar on desktop */}
      </div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
