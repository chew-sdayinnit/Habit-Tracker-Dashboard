<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<style>
:root{
  --bg:#07080f;
  --s1:#0c0e18;
  --s2:#111420;
  --s3:#161928;
  --s4:#1c2033;
  --b0:rgba(255,255,255,0.04);
  --b1:rgba(255,255,255,0.08);
  --b2:rgba(255,255,255,0.14);
  --t1:#eeeef8;
  --t2:#9898c0;
  --t3:#555578;
  --t4:#2a2a45;
  --vi:#7c6eff;--vi2:rgba(124,110,255,0.12);--vi3:rgba(124,110,255,0.25);
  --te:#2dd4bf;--te2:rgba(45,212,191,0.12);
  --am:#fb923c;--am2:rgba(251,146,60,0.12);
  --ro:#f43f5e;--ro2:rgba(244,63,94,0.12);
  --bl:#60a5fa;--bl2:rgba(96,165,250,0.12);
  --em:#34d399;--em2:rgba(52,211,153,0.12);
  --pk:#e879f9;--pk2:rgba(232,121,249,0.12);
  --mono:'JetBrains Mono',monospace;
  --r:12px;--rL:18px;--rXL:24px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
input,select,button,textarea{font-family:'Inter',sans-serif;color:var(--t1)}

/* ── Inputs ── */
input,select,textarea{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  color:var(--t1);padding:10px 14px;font-size:13px;outline:none;width:100%;
  transition:border-color .2s,background .2s;-webkit-appearance:none;-webkit-text-fill-color:var(--t1);
}
input:focus,select:focus{border-color:var(--vi);background:var(--s2)}
input::placeholder{color:var(--t4)}
select option{background:var(--s2);color:var(--t1)}

/* ── Layout ── */
#root{display:flex;flex-direction:column}
.shell{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:78px;background:var(--s1);border-right:1px solid var(--b0);display:flex;flex-direction:column;align-items:center;padding:14px 0 16px;gap:6px;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.scroll{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:0}

/* ── Topbar ── */
.topbar{background:var(--s1);border-bottom:1px solid var(--b0);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.tb-title{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.tb-sub{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-top:1px;font-weight:500}
.tb-right{display:flex;align-items:center;gap:8px}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--s3);border:1px solid var(--b1);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--t2);font-weight:500}
.chip.live{background:var(--vi2);border-color:var(--vi3);color:var(--vi)}
.chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* ── Nav ── */
.nb{width:58px;height:60px;border-radius:var(--r);border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:transparent;color:var(--t4);transition:all .18s;position:relative}
.nb .ni{font-size:0;line-height:1;transition:all .18s}
.nb .nl{font-size:9px;letter-spacing:.04em;text-transform:uppercase;font-weight:600;color:inherit;line-height:1}
.nb:hover{background:var(--s3);color:var(--t2)}
.nb.on{background:var(--vi2);color:var(--vi)}
.nb.on .ni{filter:drop-shadow(0 0 8px var(--vi))}
.nb.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:28px;background:var(--vi);border-radius:0 3px 3px 0;left:0}
.ns{flex:1}
.aib{width:40px;height:40px;border-radius:var(--r);border:1px solid var(--b1);cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--vi);font-size:15px;transition:all .18s}
.aib:hover{background:var(--vi2)}
.aib.on{background:var(--vi);color:#07080f;border-color:var(--vi);box-shadow:0 0 24px var(--vi3)}

/* ── Cards ── */
.card{background:var(--s2);border:1px solid var(--b0);border-radius:var(--rL);padding:28px 28px;margin-bottom:30px}
.card.glow-vi{border-color:var(--vi3)}
.card.glow-te{border-color:rgba(45,212,191,.25)}
.card.glow-em{border-color:rgba(52,211,153,.25)}
.card.glow-ro{border-color:rgba(244,63,94,.2)}
.inner{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);padding:14px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ── Typography ── */
.label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.label-sm{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.mono{font-family:var(--mono);font-weight:500}
.sh{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sh::after{content:'';height:1px;background:var(--b0);flex:1}
.row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--b0)}
.row:last-child{border:none}

/* ── Buttons ── */
.btn{background:var(--vi);color:#fff;border:none;border-radius:var(--r);padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s;letter-spacing:-.01em}
.btn:hover{filter:brightness(1.12);box-shadow:0 4px 20px var(--vi3)}
.btn:active{transform:scale(.97)}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--b1);border-radius:var(--r);padding:8px 14px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s}
.btn-g:hover{background:var(--s3);color:var(--t1)}
.btn-g.on{color:var(--vi);border-color:var(--vi3);background:var(--vi2)}
.btni{background:none;border:none;cursor:pointer;color:var(--t4);padding:3px 6px;border-radius:6px;font-size:12px;transition:all .18s}
.btni:hover{color:var(--ro);background:var(--ro2)}

/* ── Progress ── */
.pt{background:var(--s4);border-radius:6px;height:4px;overflow:hidden}
.pb{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── Check ── */
.cbx{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;transition:all .2s}
.cbx.on{background:var(--vi);border-color:var(--vi);box-shadow:0 0 12px var(--vi2)}
.cbx2{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0;transition:all .2s}
.cbx2.on{background:var(--em);border-color:var(--em)}

/* ── AI Panel ── */
.aip{width:0;flex-shrink:0;background:var(--s1);border-left:1px solid var(--b0);display:flex;flex-direction:column;overflow:hidden;transition:width .28s cubic-bezier(.4,0,.2,1)}
.aip.on{width:340px}
.cm{padding:11px 14px;font-size:13px;line-height:1.65;border-radius:14px;max-width:92%;white-space:pre-wrap}
.cm.u{align-self:flex-end;background:var(--vi);color:#fff;border-radius:14px 14px 3px 14px}
.cm.a{align-self:flex-start;background:var(--s2);border:1px solid var(--b1);border-radius:14px 14px 14px 3px}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes barRise{from{transform:scaleY(0);opacity:0}to{transform:scaleY(1);opacity:1}}
@keyframes drawLine{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
@keyframes ringFill{from{stroke-dasharray:0 1000}to{}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes dotPop{from{transform:scale(0)}to{transform:scale(1)}}
.section-enter{animation:fadeUp .3s ease both}

/* ── Mobile ── */
.mobnav{display:none;background:var(--s1);border-top:1px solid var(--b0);padding:8px 4px 14px;flex-shrink:0}
.mobin{display:flex;justify-content:space-around;align-items:center}
.mbb{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:transparent;color:var(--t3);padding:6px 4px;border-radius:var(--r);transition:color .18s;font-family:'Inter',sans-serif}
.mbb .ni{font-size:0}
.mbb .nl{font-size:9px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;color:inherit}
.mbb.on{color:var(--vi)}
.mbai{width:38px;height:38px;border-radius:var(--r);border:1px solid var(--b1);cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--vi);font-size:15px;transition:all .18s}
.mbai.on{background:var(--vi);color:#07080f;border-color:var(--vi)}
@media(max-width:640px){
  .sidebar{display:none}
  .mobnav{display:block}
  .aip.on{height:360px;width:100%!important}
  .g3{grid-template-columns:1fr 1fr}
  .g4{grid-template-columns:1fr 1fr}
  .fg4{grid-template-columns:1fr 1fr!important}
  .scroll{padding:16px;gap:0}
  .card{padding:28px 24px}
  .topbar{padding:0 16px}
}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;

/* ── Helpers ── */
const today=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const month=()=>today().slice(0,7);
const fmt=d=>new Date(d+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
const dn=d=>new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'narrow'});
const last=n=>{const a=[];for(let i=n-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);}return a;};
const ls=(k,def)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}};
const ss=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
function useAnim(delay=50){const[on,set]=useState(false);useEffect(()=>{const t=setTimeout(()=>set(true),delay);return()=>clearTimeout(t);},[]);return on;}

/* ── Color tokens ── */
const VI='#7c6eff',TE='#2dd4bf',AM='#fb923c',RO='#f43f5e',BL='#60a5fa',EM='#34d399',PK='#e879f9';
const PRI={high:RO,medium:AM,low:'var(--t4)'};

/* ── DEFAULT DATA ── */
const DEF={
  fitness:{workouts:[],routine:[
    {day:1,name:'Push Day',exercises:[]},{day:2,name:'Pull Day',exercises:[]},
    {day:3,name:'Leg Day',exercises:[]},{day:4,name:'Rest Day',exercises:[]},
    {day:5,name:'Upper Body',exercises:[]},{day:6,name:'Lower Body',exercises:[]},
    {day:7,name:'Active Recovery',exercises:[]}
  ],routineStart:null},
  sleep:{logs:[]},goals:{list:[],habits:[]},
  todos:{list:[]},
  business:{clients:[],retainers:[],kpis:[]},
  finance:{transactions:[]}
};

/* ── Supabase ── */
const SURL='https://gilqlhyncririjjgczlk.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpbHFsaHluY3JpcmlqamdjemxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NTU0NjMsImV4cCI6MjA5NTMzMTQ2M30.3OwchpwVcY1HYn0iXptA7Hrz_17EZbq0OoY-80Gp2b0';
const sbSignIn=async(e,p)=>{try{const r=await fetch(SURL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'Content-Type':'application/json','apikey':SKEY},body:JSON.stringify({email:e,password:p})});return r.json();}catch(ex){return{error:{message:ex.message}};}};
const sbSignUp=async(e,p)=>{try{const r=await fetch(SURL+'/auth/v1/signup',{method:'POST',headers:{'Content-Type':'application/json','apikey':SKEY},body:JSON.stringify({email:e,password:p})});return r.json();}catch(ex){return{error:{message:ex.message}};}};
const sbSignOut=async(t)=>{try{await fetch(SURL+'/auth/v1/logout',{method:'POST',headers:{'apikey':SKEY,'Authorization':'Bearer '+t}});}catch(e){}};
const sbLoad=async(uid,t)=>{try{const r=await fetch(SURL+'/rest/v1/dashboard_data?user_id=eq.'+uid+'&select=data',{headers:{'apikey':SKEY,'Authorization':'Bearer '+t}});if(!r.ok)return null;const rows=await r.json();return rows&&rows.length>0?JSON.parse(rows[0].data):null;}catch(e){return null;}};
const sbSave=async(uid,t,data,hasRow)=>{try{const url=hasRow?SURL+'/rest/v1/dashboard_data?user_id=eq.'+uid:SURL+'/rest/v1/dashboard_data';await fetch(url,{method:hasRow?'PATCH':'POST',headers:{'apikey':SKEY,'Authorization':'Bearer '+t,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(hasRow?{data:JSON.stringify(data)}:{user_id:uid,data:JSON.stringify(data)})});}catch(e){console.error(e);}};

/* ══════════════════════════════════════════════════════════
   CHART COMPONENTS
══════════════════════════════════════════════════════════ */

/* Ring / donut */
function Ring({pct=0,sz=120,sw=10,color=VI,val='',label='',sub='',glow=false}){
  const anim=useAnim(100);
  const r=(sz-sw)/2,c=2*Math.PI*r;
  const dash=anim?c*(Math.min(Math.max(pct,0),100)/100):0;
  return(
    <div style={{position:'relative',width:sz,height:sz,flexShrink:0}}>
      <svg width={sz} height={sz} style={{transform:'rotate(-90deg)',display:'block'}}>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="var(--s4)" strokeWidth={sw}/>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeDasharray={`${dash} ${c}`} strokeLinecap="round"
          style={{transition:anim?'stroke-dasharray .9s cubic-bezier(.4,0,.2,1)':'none',filter:glow?`drop-shadow(0 0 8px ${color}88)`:'none'}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
        <div style={{fontFamily:'var(--mono)',fontSize:sz>100?sz>130?32:26:sz>80?20:16,fontWeight:700,color:'var(--t1)',lineHeight:1,letterSpacing:'-.02em'}}>{val||`${Math.round(pct)}%`}</div>
        {label&&<div style={{fontSize:9,color:'var(--t3)',letterSpacing:'.12em',textTransform:'uppercase',fontWeight:600,marginTop:2}}>{label}</div>}
        {sub&&<div style={{fontSize:10,color,fontWeight:600,marginTop:1}}>{sub}</div>}
      </div>
    </div>
  );
}

/* Animated bar chart */
function Bars({vals=[],labels=[],color=VI,h=80,accent=null}){
  const anim=useAnim(80);
  const mx=Math.max(...vals.map(v=>Number(v)||0),1);
  return(
    <div style={{display:'flex',gap:6,alignItems:'flex-end',height:h}}>
      {vals.map((v,i)=>{
        const pct=((Number(v)||0)/mx)*100;
        const isTd=i===vals.length-1;
        const c=isTd?(accent||color):color+'55';
        return(
          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:5,height:'100%',justifyContent:'flex-end'}}>
            {Number(v)>0&&anim&&<div style={{fontSize:9,color:isTd?'var(--t2)':'var(--t4)',fontFamily:'var(--mono)',fontWeight:500,animation:'fadeUp .3s ease both',animationDelay:`${i*40}ms`}}>{Number(v)%1===0?v:Number(v).toFixed(1)}</div>}
            <div style={{width:'100%',height:`${anim?pct:0}%`,minHeight:Number(v)&&anim?3:0,background:`linear-gradient(180deg,${c},${c}aa)`,borderRadius:'5px 5px 2px 2px',transition:`height .7s cubic-bezier(.4,0,.2,1) ${i*60}ms`,transformOrigin:'bottom',boxShadow:isTd&&Number(v)?`0 0 12px ${c}66`:''}}/>
            {labels[i]&&<div style={{fontSize:9,color:isTd?'var(--t2)':'var(--t4)',fontWeight:isTd?600:400}}>{labels[i]}</div>}
          </div>
        );
      })}
    </div>
  );
}

/* Animated sparkline */
function Spark({vals=[],color=VI,h=50,labels=null}){
  const anim=useAnim(100);
  if(!vals||vals.length<2)return<div style={{height:h,background:'var(--s3)',borderRadius:8,opacity:.3}}/>;
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const PAD=18;
  const W=300,H=h;
  const chartH=labels?H-16:H;
  // Points inset by PAD so first/last dots align with label centers
  const pts=vals.map((v,i)=>[PAD+i*((W-PAD*2)/(vals.length-1)),(1-(v-mn)/rng)*(chartH-14)+7]);
  const path='M'+pts.map(([x,y])=>`${x.toFixed(1)},${y.toFixed(1)}`).join(' L');
  const area=path+` L${pts[pts.length-1][0]},${chartH} L${pts[0][0]},${chartH} Z`;
  const totalLen=pts.reduce((s,[x,y],i)=>i===0?0:s+Math.hypot(x-pts[i-1][0],y-pts[i-1][1]),0)||500;
  const id='sp'+Math.random().toString(36).slice(2,6);
  const totalH=labels?H+16:H;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${totalH}`} preserveAspectRatio="none" style={{overflow:'visible',display:'block'}}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${id})`} style={{opacity:anim?1:0,transition:'opacity .6s ease .3s'}}/>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        strokeDasharray={totalLen} strokeDashoffset={anim?0:totalLen}
        style={{transition:anim?`stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)`:'none'}}/>
      {anim&&pts.map(([x,y],i)=>(
        <circle key={i} cx={x} cy={y} r={i===pts.length-1?4:2} fill={color}
          style={{opacity:i===pts.length-1?1:.6,animation:`dotPop .3s ease both`,animationDelay:`${.8+i*0.04}s`,filter:i===pts.length-1?`drop-shadow(0 0 5px ${color})`:'none'}}/>
      ))}
      {labels&&pts.map(([x],i)=>(
        <text key={i} x={x} y={totalH-2} textAnchor="middle" fontSize="9" fill="var(--t4)" fontFamily="Inter,sans-serif"
          style={{opacity:anim?1:0,transition:`opacity .4s ease ${i*40}ms`}}>{labels[i]}</text>
      ))}
    </svg>
  );
}

/* Heatmap */
function Heatmap({days=[],color=VI,weeks=5}){
  const anim=useAnim(100);
  const cells=last(weeks*7);
  const has=new Set(days);
  const cols=[];
  for(let w=0;w<weeks;w++)cols.push(cells.slice(w*7,(w+1)*7));
  return(
    <div style={{display:'flex',gap:3}}>
      {cols.map((wk,wi)=>(
        <div key={wi} style={{display:'flex',flexDirection:'column',gap:3,flex:1}}>
          {wk.map((d,di)=>{
            const a=has.has(d),isTd=d===today();
            return(
              <div key={di} title={fmt(d)} style={{
                height:13,borderRadius:4,
                background:a?color+'cc':'var(--s3)',
                border:`1px solid ${isTd?color+'80':'transparent'}`,
                opacity:anim?1:0,
                transition:`opacity .4s ease ${(wi*7+di)*15}ms, background .2s`
              }}/>
            );
          })}
        </div>
      ))}
    </div>
  );
}

/* Week dots strip */
function WeekDots({dates=[],color=VI}){
  const anim=useAnim(80);
  const days=last(7);
  return(
    <div style={{display:'flex',gap:5}}>
      {days.map((d,i)=>{
        const done=dates.includes(d),isTd=d===today();
        return(
          <div key={d} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
            <div style={{
              width:28,height:28,borderRadius:'50%',

              boxShadow:done?`0 0 10px ${color}55`:'',

              transform:anim?'scale(1)':'scale(0)',

/* ══════════════════════════════════════════════════════════
   AI PANEL
══════════════════════════════════════════════════════════ */
function AIPanel({data,open,onClose}){
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState('');
  const [loading,setLoading]=useState(false);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('dash-apikey')||'');
  const [showKey,setShowKey]=useState(false);
  const bot=useRef(null);
  useEffect(()=>{if(bot.current)bot.current.scrollIntoView({behavior:'smooth'});},[msgs,loading]);
  const ctx=()=>{
    const t=today(),m=month(),days=last(7);
    const mtx=data.finance.transactions.filter(x=>x.date&&x.date.startsWith(m));
    const inc=mtx.filter(x=>x.type==='income').reduce((s,x)=>s+Number(x.amount),0);
    const exp=mtx.filter(x=>x.type==='expense').reduce((s,x)=>s+Number(x.amount),0);
    const mrr=(data.business.retainers||[]).reduce((s,r)=>s+Number(r.amount||0),0);
    return `Today:${t}
FITNESS:${data.fitness.workouts.filter(w=>days.includes(w.date)).length} workouts this week
SLEEP:${JSON.stringify(data.sleep.logs.filter(l=>days.includes(l.date)))}
GOALS:${JSON.stringify(data.goals.list)}
HABITS:${JSON.stringify(data.goals.habits.map(h=>({name:h.name,doneToday:(h.completedDates&&h.completedDates.includes(t))})))}
TODOS:${JSON.stringify(data.todos.list.filter(x=>!x.done).slice(0,8))}
BUSINESS:${data.business.clients?data.business.clients.length:0} clients, MRR $${mrr}
FINANCE: Income $${inc}, Expenses $${exp}, Net $${inc-exp}`;
  };
  const send=async()=>{
    if(!inp.trim()||loading||!apiKey)return;
    const msg=inp.trim();setInp('');
    const m=[...msgs,{role:'user',content:msg}];setMsgs(m);setLoading(true);
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:`You are a direct, data-driven personal coach. Use dashboard data. Be concise and actionable.\n\n${ctx()}`,messages:m})});
      const j=await r.json();
      const txt=j.content&&j.content[0]?j.content[0].text:'Error.';
      setMsgs([...m,{role:'assistant',content:txt}]);
    }catch(e){setMsgs([...m,{role:'assistant',content:'Error: '+e.message}]);}
    setLoading(false);
  };
  return(
    <div className={`aip${open?' on':''}`}>
      <div style={{padding:'14px 16px',borderBottom:'1px solid var(--b0)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:VI,display:'flex',alignItems:'center',gap:7}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:VI,display:'inline-block',boxShadow:`0 0 8px ${VI}`}}/>Overseer
          </div>
          <div style={{fontSize:11,color:'var(--t3)',marginTop:1}}>Your AI coach</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setShowKey(p=>!p)} className="btn-g" style={{padding:'4px 9px',fontSize:11}}>API Key</button>
          <button onClick={onClose} className="btni">✕</button>
        </div>
      </div>
      {showKey&&<div style={{padding:'12px 16px',borderBottom:'1px solid var(--b0)'}}>
        <div style={{fontSize:11,color:'var(--t2)',marginBottom:6}}>Anthropic key — stored locally</div>
        <div style={{display:'flex',gap:6}}>
          <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." style={{flex:1,fontSize:12}}/>
          <button onClick={()=>{localStorage.setItem('dash-apikey',apiKey);setShowKey(false);}} className="btn" style={{padding:'8px 12px',fontSize:12}}>Save</button>
        </div>
      </div>}
      <div style={{flex:1,overflowY:'auto',padding:14,display:'flex',flexDirection:'column',gap:10}}>
        {msgs.length===0&&<div style={{textAlign:'center',color:'var(--t3)',fontSize:12,marginTop:32,lineHeight:2.4}}>
          {!apiKey&&<div style={{color:AM,marginBottom:12}}>⚠ Add your API key above</div>}
          <div style={{color:'var(--t4)'}}>"Am I on track this week?"<br/>"What should I focus on?"<br/>"How is my sleep trending?"</div>
        </div>}
        {msgs.map((m,i)=><div key={i} className={`cm ${m.role==='user'?'u':'a'}`}>{m.content}</div>)}
        {loading&&<div style={{alignSelf:'flex-start',color:'var(--t3)',fontSize:12,display:'flex',gap:6,alignItems:'center'}}><span style={{width:6,height:6,borderRadius:'50%',background:VI,display:'inline-block',animation:'pulse 1s infinite'}}/>Thinking...</div>}
        <div ref={bot}/>
      </div>
      <div style={{padding:'12px 14px',borderTop:'1px solid var(--b0)',display:'flex',gap:8,flexShrink:0}}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Ask Overseer..."/>
        <button onClick={send} className="btn" style={{padding:'10px 14px',fontSize:15}}>↑</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   LOGIN
══════════════════════════════════════════════════════════ */
function LoginScreen({onLogin}){
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [isUp,setIsUp]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const submit=async()=>{
    if(!email.trim()||!pw.trim())return;
    setLoading(true);setErr('');
    const res=isUp?await sbSignUp(email,pw):await sbSignIn(email,pw);
    if(res.error){setErr(res.error.message||'Something went wrong.');}
    else{
      const token=res.access_token||(res.session&&res.session.access_token);
      const uid=res.user&&res.user.id;
      if(token&&uid){localStorage.setItem('sb-token',token);localStorage.setItem('sb-uid',uid);await onLogin(token,uid);}
      else{setErr(isUp?'Check your email to confirm, then sign in.':'Login failed.');}
    }
    setLoading(false);
  };
  const isConf=err.includes('confirm')||err.includes('email');
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)'}}>
      <div style={{width:'100%',maxWidth:380,padding:'0 24px'}}>
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{width:48,height:48,borderRadius:14,background:VI+'22',border:`1px solid ${VI}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,margin:'0 auto 16px'}}>◈</div>
          <div style={{fontSize:26,fontWeight:800,color:'var(--t1)',letterSpacing:'-.02em',marginBottom:6}}>My Dashboard</div>
          <div style={{fontSize:13,color:'var(--t3)'}}>{isUp?'Create your account':'Welcome back'}</div>
        </div>
        <div style={{background:'var(--s2)',border:'1px solid var(--b1)',borderRadius:24,padding:28,display:'flex',flexDirection:'column',gap:14}}>
          <div><div className="label" style={{marginBottom:6}}>Email</div><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="you@email.com"/></div>
          <div><div className="label" style={{marginBottom:6}}>Password</div><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="min 6 characters"/></div>
          {err&&<div style={{fontSize:12,color:isConf?EM:RO,background:isConf?'var(--em2)':'var(--ro2)',border:`1px solid ${isConf?EM:RO}33`,borderRadius:12,padding:'9px 13px',lineHeight:1.5}}>{err}</div>}
          <button onClick={submit} className="btn" style={{padding:12,fontSize:14,opacity:loading?.7:1,width:'100%'}} disabled={loading}>{loading?'Please wait...':(isUp?'Create account':'Sign in')}</button>
          <div style={{textAlign:'center',fontSize:12,color:'var(--t3)'}}>
            {isUp?'Already have an account? ':'New here? '}
            <span onClick={()=>{setIsUp(p=>!p);setErr('');}} style={{color:VI,cursor:'pointer',fontWeight:600}}>{isUp?'Sign in':'Create account'}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   FITNESS
══════════════════════════════════════════════════════════ */
function Fitness({data,save}){
  const t=today(),days=last(7);
  const routine=data.fitness.routine||DEF.fitness.routine;
  const startDate=data.fitness.routineStart||t;
  const dayIdx=Math.max(0,Math.floor((new Date(t)-new Date(startDate))/86400000))%7;
  const todayR=routine[dayIdx];
  const [editDay,setEditDay]=useState(null);
  const [newEx,setNewEx]=useState({name:'',sets:'',reps:'',weight:''});
  const [logEx,setLogEx]=useState({name:'',sets:'',reps:'',weight:''});
  const wD=new Set(data.fitness.workouts.map(w=>w.date));
  const wkCnt=days.filter(d=>wD.has(d)).length;
  const tw=data.fitness.workouts.find(w=>w.date===t)||{date:t,exercises:[]};
  const tSets=tw.exercises?tw.exercises.reduce((s,e)=>s+Number(e.sets||0),0):0;
  const tVol=tw.exercises?tw.exercises.reduce((s,e)=>s+Number(e.sets||0)*Number(e.reps||0)*Number(e.weight||0),0):0;
  const volTrend=days.map(d=>{const w=data.fitness.workouts.find(x=>x.date===d);return w&&w.exercises?w.exercises.reduce((s,e)=>s+Number(e.sets||0)*Number(e.reps||0)*Number(e.weight||0),0):0;});
  const saveR=(r,s)=>save({...data,fitness:{...data.fitness,routine:r,routineStart:s||startDate}});
  const addToDay=(di,ex)=>{const r=[...routine];r[di]={...r[di],exercises:[...r[di].exercises,{...ex,id:Date.now()}]};saveR(r);};
  const remFromDay=(di,id)=>{const r=[...routine];r[di]={...r[di],exercises:r[di].exercises.filter(e=>e.id!==id)};saveR(r);};
  const logExercise=()=>{
    if(!logEx.name)return;
    const ws=[...data.fitness.workouts];const idx=ws.findIndex(w=>w.date===t);
    const ne={...logEx,id:Date.now()};
    if(idx>=0)ws[idx]={...ws[idx],exercises:[...ws[idx].exercises,ne]};
    else ws.push({date:t,exercises:[ne]});
    save({...data,fitness:{...data.fitness,workouts:ws}});
    setLogEx({name:'',sets:'',reps:'',weight:''});
  };
  const remLogged=(id)=>{const ws=data.fitness.workouts.map(w=>w.date===t?{...w,exercises:w.exercises.filter(e=>e.id!==id)}:w).filter(w=>w.exercises.length>0);save({...data,fitness:{...data.fitness,workouts:ws}});};
  return(<div className="section-enter">
    {/* Hero */}
    <div className="card glow-vi" style={{background:`linear-gradient(135deg,var(--s2),#150f30)`}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
        <Ring pct={Math.round(wkCnt/7*100)} sz={140} sw={11} color={VI} val={`${wkCnt}/7`} label="this week" sub="days trained" glow/>
        <div className="g2" style={{width:'100%',gap:10}}>
          <Stat label="Sets today" val={tSets} color={VI} accent={VI}/>
          <Stat label="Volume (lbs)" val={tVol.toLocaleString()} color={VI} accent={VI}/>
        </div>
        <div style={{width:'100%'}}>
          <div className="label-sm" style={{marginBottom:10}}>Weekly activity</div>
          <div style={{display:'flex',gap:5}}>
            {days.map((d,i)=>{const has=wD.has(d),isTd=d===t;return(
              <div key={d} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{width:'100%',height:40,borderRadius:9,background:has?VI+'bb':'var(--s3)',border:`1.5px solid ${isTd?VI+'80':'transparent'}`,boxShadow:has?`0 0 12px ${VI}44`:'',transition:'all .2s'}}/>
                <span style={{fontSize:9,color:isTd?'var(--t2)':'var(--t4)',fontWeight:isTd?700:400}}>{dn(d)}</span>
              </div>
            );})}
          </div>
        </div>
      </div>
    </div>
    {/* Today routine */}
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
        <div>
          <div className="label" style={{color:VI,marginBottom:5}}>Day {dayIdx+1} of 7</div>
          <div style={{fontSize:20,fontWeight:700,color:'var(--t1)'}}>{todayR.name}</div>
        </div>
        <button onClick={()=>save({...data,fitness:{...data.fitness,routineStart:t}})} className="btn-g" style={{fontSize:11,padding:'6px 11px',flexShrink:0}}>Reset cycle</button>
      </div>
      {todayR.exercises.length===0?
        <div style={{color:'var(--t3)',fontSize:13,textAlign:'center',padding:'16px 0'}}>No exercises set — build your routine below.</div>:
        <div>
          {todayR.exercises.map(e=>{

      <div className="sh">Training history — 35 days</div>
      <Heatmap days={data.fitness.workouts.map(w=>w.date)} color={VI} weeks={5}/>
      <div style={{display:'flex',justifyContent:'flex-end',gap:5,marginTop:10,alignItems:'center'}}>
        <span style={{fontSize:9,color:'var(--t4)'}}>Less</span>
        {['var(--s3)',VI+'44',VI+'88',VI+'cc'].map((c,i)=><div key={i} style={{width:11,height:11,borderRadius:3,background:c}}/>)}
        <span style={{fontSize:9,color:'var(--t4)'}}>More</span>
      </div>
    </div>
    {/* Routine builder */}
    <div className="card">
      <div className="sh">7-day routine</div>
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
        {routine.map((day,i)=>(
          <button key={i} onClick={()=>setEditDay(editDay===i?null:i)} className="btn-g"

            {day.name}{i===dayIdx?' ←':''}

      {editDay!==null&&<div style={{background:'var(--s1)',borderRadius:12,padding:16,border:'1px solid var(--b1)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,gap:10}}>
          <div style={{fontSize:13,fontWeight:600}}>{routine[editDay].name}</div>

        </div>
        {routine[editDay].exercises.map(e=>(
          <div key={e.id} className="row">
            <span style={{flex:1,fontSize:13,fontWeight:500}}>{e.name}</span>
            <span style={{fontSize:12,color:'var(--t3)',fontFamily:'var(--mono)'}}>{e.sets}×{e.reps}{e.weight?` @ ${e.weight}lbs`:''}</span>
            <button className="btni" onClick={()=>remFromDay(editDay,e.id)}>✕</button>
          </div>
        ))}
        <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
          <input value={newEx.name} onChange={e=>setNewEx(p=>({...p,name:e.target.value}))} placeholder="Exercise" style={{flex:2,minWidth:120}}/>
          <input value={newEx.sets} onChange={e=>setNewEx(p=>({...p,sets:e.target.value}))} placeholder="Sets" type="number" style={{flex:1,minWidth:60}}/>
          <input value={newEx.reps} onChange={e=>setNewEx(p=>({...p,reps:e.target.value}))} placeholder="Reps" type="number" style={{flex:1,minWidth:60}}/>
          <input value={newEx.weight} onChange={e=>setNewEx(p=>({...p,weight:e.target.value}))} placeholder="lbs" type="number" style={{flex:1,minWidth:60}}/>
          <button onClick={()=>{if(!newEx.name)return;addToDay(editDay,newEx);setNewEx({name:'',sets:'',reps:'',weight:''}); }} className="btn">Add</button>
        </div>
      </div>}
    </div>
  </div>);
}

/* ══════════════════════════════════════════════════════════
   SLEEP & HEALTH
══════════════════════════════════════════════════════════ */
function SleepHealth({data,save}){
  const t=today(),days=last(7);
  const tL=data.sleep.logs.find(l=>l.date===t)||{};
  const [form,setForm]=useState({hours:tL.hours||'',quality:tL.quality||'',water:tL.water||'',steps:tL.steps||'',bodyWeight:tL.bodyWeight||''});
  const recent=days.map(d=>data.sleep.logs.find(l=>l.date===d)||{date:d});
  const hL=recent.filter(l=>l.hours),avg=hL.length?hL.reduce((s,l)=>s+Number(l.hours),0)/hL.length:0;
  const sp=tL.quality?Math.round(Number(tL.quality)/5*100):0;
  const slHrs=days.map(d=>{const l=data.sleep.logs.find(x=>x.date===d);return l?Number(l.hours)||0:0;});
  const slQ=days.map(d=>{const l=data.sleep.logs.find(x=>x.date===d);return l?Number(l.quality)||0:0;});
  const slWater=days.map(d=>{const l=data.sleep.logs.find(x=>x.date===d);return l?Number(l.water)||0:0;});
  const slWeight=days.map(d=>{const l=data.sleep.logs.find(x=>x.date===d);return l&&l.bodyWeight?Number(l.bodyWeight):0;});
  const scoreColor=sp>=80?EM:sp>=60?AM:sp>0?RO:BL;
  const logT=()=>{const logs=data.sleep.logs.filter(l=>l.date!==t);logs.push({date:t,...form});save({...data,sleep:{logs}});};
  return(<div className="section-enter">
    {/* Hero */}
    <div className="card" style={{background:'linear-gradient(135deg,var(--s2),#0c1830)',borderColor:'rgba(96,165,250,.2)'}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
        <Ring pct={sp} sz={140} sw={11} color={scoreColor} val={sp?`${sp}%`:'—'} label="sleep score" sub={sp>=80?'optimal':sp>=60?'sufficient':sp>0?'poor':'log tonight'} glow/>
        <div className="g2" style={{width:'100%',gap:10}}>
          <Stat label="Avg (7 days)" val={avg?`${avg.toFixed(1)}h`:'—'} color={BL} accent={BL}/>
          <Stat label="Last night" val={tL.hours?`${tL.hours}h`:'—'} color='var(--t1)' accent={BL}/>
          <Stat label="Steps" val={tL.steps||'—'} color='var(--t1)' accent={TE}/>
          <Stat label="Weight" val={tL.bodyWeight?`${tL.bodyWeight}lbs`:'—'} color='var(--t1)' accent={VI}/>
        </div>
      </div>
    </div>
    {/* Sleep bar chart */}
    <div className="card">
      <div className="sh">Sleep hours — 7 nights</div>
      <Bars vals={slHrs} labels={days.map(dn)} color={BL} h={130}/>
      <div style={{display:'flex',gap:12,marginTop:12,paddingTop:10,borderTop:'1px solid var(--b0)'}}>
        {[{l:'Optimal',c:EM},{l:'Sufficient',c:AM},{l:'Poor',c:RO}].map(x=><div key={x.l} style={{display:'flex',gap:5,alignItems:'center'}}><div style={{width:7,height:7,borderRadius:'50%',background:x.c}}/><span style={{fontSize:10,color:'var(--t3)'}}>{x.l}</span></div>)}
        <div style={{marginLeft:'auto',fontSize:10,color:'var(--t3)',fontStyle:'italic'}}>Target: 8h</div>
      </div>
    </div>
    {/* Quality sparkline */}
    <div className="card">
      <div className="sh">Sleep quality trend</div>
      <Spark vals={slQ} color={BL} h={80} labels={days.map(dn)}/>
    </div>
    {/* Water bars */}
    <div className="card">
      <div className="sh">Water intake — 7 days</div>
      <Bars vals={slWater} labels={days.map(dn)} color={TE} h={110}/>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:10,paddingTop:8,borderTop:'1px solid var(--b0)'}}>
        <span style={{fontSize:11,color:'var(--t3)'}}>Daily intake (L)</span>
        <span style={{fontFamily:'var(--mono)',fontSize:11,color:TE,fontWeight:600}}>{tL.water?`${tL.water}L today`:'— today'}</span>
      </div>
    </div>
    {/* Weight sparkline */}
    {slWeight.some(v=>v>0)&&<div className="card">
      <div className="sh">Body weight trend</div>
      <Spark vals={slWeight.map(v=>v||null).some(v=>v)?slWeight:slWeight.map(v=>v||0)} color={PK} h={80} labels={days.map(dn)}/>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:10,paddingTop:8,borderTop:'1px solid var(--b0)'}}>
        <span style={{fontSize:11,color:'var(--t3)'}}>Body weight (lbs)</span>
        <span style={{fontFamily:'var(--mono)',fontSize:11,color:PK,fontWeight:600}}>{tL.bodyWeight?`${tL.bodyWeight} lbs`:'— today'}</span>
      </div>
    </div>}
    {/* Log */}
    <div className="card">
      <div className="sh">Log today</div>
      <div className="g2" style={{gap:10,marginBottom:14}}>
        {[{l:'Hours slept',k:'hours',t:'number',s:'0.5',p:'7.5'},{l:'Quality (1–5)',k:'quality',t:'number',p:'4'},{l:'Water (L)',k:'water',t:'number',s:'0.1',p:'2.5'},{l:'Steps',k:'steps',t:'number',p:'8000'},{l:'Weight (lbs)',k:'bodyWeight',t:'number',s:'0.1',p:'180'}].map(f=>(
          <div key={f.k}><div className="label" style={{marginBottom:5}}>{f.l}</div><input value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} type={f.t} step={f.s} placeholder={f.p}/></div>
        ))}
      </div>
      <button onClick={logT} className="btn">Save today</button>
    </div>
  </div>);
}

/* ══════════════════════════════════════════════════════════
   GOALS & HABITS
══════════════════════════════════════════════════════════ */
function GoalsHabits({data,save}){
  const t=today();
  const [gF,setGF]=useState({title:'',current:'',target:'',unit:''});
  const [hN,setHN]=useState('');
  const addG=()=>{if(!gF.title)return;save({...data,goals:{...data.goals,list:[...data.goals.list,{...gF,id:Date.now()}]}});setGF({title:'',current:'',target:'',unit:''}); };
  const updG=(id,v)=>save({...data,goals:{...data.goals,list:data.goals.list.map(g=>g.id===id?{...g,current:v}:g)}});
  const remG=(id)=>save({...data,goals:{...data.goals,list:data.goals.list.filter(g=>g.id!==id)}});
  const addH=()=>{if(!hN.trim())return;save({...data,goals:{...data.goals,habits:[...data.goals.habits,{id:Date.now(),name:hN.trim(),completedDates:[]}]}});setHN('');};
  const togH=(id)=>{const h=data.goals.habits.map(h=>{if(h.id!==id)return h;const d=h.completedDates||[];return{...h,completedDates:d.includes(t)?d.filter(x=>x!==t):[...d,t]};});save({...data,goals:{...data.goals,habits:h}});};
  const streak=h=>{let s=0;const d=new Date();while(h.completedDates&&h.completedDates.includes(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`)){s++;d.setDate(d.getDate()-1);}return s;};
  const habDone=data.goals.habits.filter(h=>h.completedDates&&h.completedDates.includes(t)).length;
  const habTotal=data.goals.habits.length;
  const wkComp=last(7).map(d=>habTotal>0?Math.round(data.goals.habits.filter(h=>h.completedDates&&h.completedDates.includes(d)).length/habTotal*100):0);
  const COLORS=[AM,VI,TE,BL,PK,EM,RO];
  return(<div className="section-enter">
    {/* Stats */}
    <div className="g2">
      <div className="card" style={{background:'linear-gradient(135deg,var(--s2),#1a1408)',borderColor:AM+'33'}}>
        <div className="sh">Habits today</div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <Ring pct={habTotal?Math.round(habDone/habTotal*100):0} sz={90} sw={8} color={AM} val={`${habDone}/${habTotal}`} sub="done" glow/>
          <div><div style={{fontFamily:'var(--mono)',fontSize:30,fontWeight:800,color:AM,lineHeight:1}}>{habTotal?Math.round(habDone/habTotal*100):0}<span style={{fontSize:16,color:'var(--t3)'}}>%</span></div><div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>completion rate</div></div>
        </div>
      </div>
      <div className="card" style={{background:'linear-gradient(135deg,var(--s2),#120e1f)',borderColor:VI+'33'}}>
        <div className="sh">Goals</div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <Ring pct={data.goals.list.length?Math.round(data.goals.list.filter(g=>g.target&&Number(g.current)>=Number(g.target)).length/data.goals.list.length*100):0} sz={90} sw={8} color={VI} val={`${data.goals.list.filter(g=>g.target&&Number(g.current)>=Number(g.target)).length}/${data.goals.list.length}`} sub="done" glow/>
          <div><div style={{fontFamily:'var(--mono)',fontSize:30,fontWeight:800,color:VI,lineHeight:1}}>{data.goals.list.length?Math.round(data.goals.list.filter(g=>g.target&&Number(g.current)>=Number(g.target)).length/data.goals.list.length*100):0}<span style={{fontSize:16,color:'var(--t3)'}}>%</span></div><div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>complete</div></div>
        </div>
      </div>
    </div>
    {/* Completion rate chart */}
    {habTotal>0&&<div className="card">
      <div className="sh">Completion trend — 7 days</div>
      <Bars vals={wkComp} labels={last(7).map(dn)} color={AM} h={110}/>
      <div style={{marginTop:16,paddingTop:14,borderTop:'1px solid var(--b0)'}}>
        <div className="label-sm" style={{marginBottom:10}}>Trend line</div>
        <Spark vals={wkComp} color={AM} h={70} labels={last(7).map(dn)}/>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:10,paddingTop:8,borderTop:'1px solid var(--b0)'}}>
          <span style={{fontSize:11,color:'var(--t3)'}}>Daily habit completion %</span>
          <span style={{fontFamily:'var(--mono)',fontSize:11,color:AM,fontWeight:700}}>{wkComp[wkComp.length-1]}% today</span>
        </div>
      </div>
    </div>}
    {/* Habits list */}
    <div className="card">
      <div className="sh">Daily habits</div>
      {data.goals.habits.length===0&&<div style={{color:'var(--t4)',fontSize:13,textAlign:'center',padding:'16px 0'}}>No habits yet.</div>}
      {data.goals.habits.map((h,hi)=>{
        const done=h.completedDates&&h.completedDates.includes(t),st=streak(h);
        const color=COLORS[hi%COLORS.length];
        return(
          <div key={h.id} style={{padding:'14px 0',borderBottom:'1px solid var(--b0)'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
              <button className={`cbx${done?' on':''}`} onClick={()=>togH(h.id)} style={{borderColor:done?color:'var(--b2)',background:done?color:'transparent',boxShadow:done?`0 0 12px ${color}44`:''}}>{done&&'✓'}</button>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:done?color:'var(--t1)'}}>{h.name}</div>
                <div style={{fontSize:11,marginTop:2,color:'var(--t3)'}}>
                  {st>0?<span style={{color:AM}}>🔥 {st} day streak · {h.completedDates?h.completedDates.length:0} total</span>:<span>Start your streak today</span>}
                </div>
              </div>
              <button className="btni" onClick={()=>save({...data,goals:{...data.goals,habits:data.goals.habits.filter(x=>x.id!==h.id)}})}>✕</button>
            </div>
            <WeekDots dates={h.completedDates||[]} color={color}/>
          </div>
        );
      })}
      <div style={{display:'flex',gap:8,marginTop:16}}>
        <input value={hN} onChange={e=>setHN(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addH()} placeholder="New habit..." style={{flex:1}}/>
        <button onClick={addH} className="btn">Add</button>
      </div>
    </div>
    {/* Habit heatmap */}
    {habTotal>0&&<div className="card">
      <div className="sh">Activity heatmap — 35 days</div>
      <Heatmap days={data.goals.habits.flatMap(h=>h.completedDates||[])} color={AM} weeks={5}/>
    </div>}
    {/* Goals */}
    <div className="card">
      <div className="sh">Goals</div>
      {data.goals.list.length===0&&<div style={{color:'var(--t4)',fontSize:13,textAlign:'center',padding:'12px 0'}}>No goals yet.</div>}
      {data.goals.list.map((g,gi)=>{
        const pct=g.target?Math.min(100,Number(g.current)/Number(g.target)*100):0;
        const c=pct>=100?EM:pct>=60?VI:AM;
        return(
          <div key={g.id} style={{padding:'14px 0',borderBottom:'1px solid var(--b0)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:'var(--t1)'}}>{g.title}</div>
                <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--t3)',marginTop:2}}>{g.current} / {g.target} {g.unit}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <input value={g.current} onChange={e=>updG(g.id,e.target.value)} type="number" style={{width:72,textAlign:'right'}}/>
                <button className="btni" onClick={()=>remG(g.id)}>✕</button>
              </div>
            </div>
            <Prog pct={pct} color={c}/>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
              <div style={{fontSize:10,color:'var(--t3)'}}>{pct<100?`${(Number(g.target)-Number(g.current)).toFixed(1)} ${g.unit} remaining`:''}</div>
              <div style={{fontFamily:'var(--mono)',fontSize:11,color:c,fontWeight:700}}>{pct>=100?'🏆 Complete':pct.toFixed(0)+'%'}</div>
            </div>
          </div>
        );
      })}
      <div style={{marginTop:16}}>
        <div className="fg4" style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:8,marginBottom:10}}>
          <input value={gF.title} onChange={e=>setGF(p=>({...p,title:e.target.value}))} placeholder="Goal title"/>
          <input value={gF.current} onChange={e=>setGF(p=>({...p,current:e.target.value}))} placeholder="Now" type="number"/>
          <input value={gF.target} onChange={e=>setGF(p=>({...p,target:e.target.value}))} placeholder="Target" type="number"/>
          <input value={gF.unit} onChange={e=>setGF(p=>({...p,unit:e.target.value}))} placeholder="Unit"/>
        </div>
        <button onClick={addG} className="btn">Add goal</button>
      </div>
    </div>
  </div>);
}

/* ══════════════════════════════════════════════════════════
